name: ci
on:
  push:
  pull_request:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - run: pip install --quiet ruff
      - name: lint
        run: ruff check .
      - name: format check
        run: ruff format --check .
      - name: tests (unit + fuzz + output/bundle validation)
        run: python3 test_ff_orca.py
