name: ci
on:
  push:
  pull_request:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      # Unit + fuzz tests for the resolver/classifier, and validation that every
      # shipped preset in import-into-orca/ is self-contained + correctly typed.
      - run: python3 test_ff_orca.py
