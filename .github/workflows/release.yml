name: release
on:
  push:
    tags:
      - "v*"
permissions:
  contents: write
jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - run: pip install --quiet ruff
      - name: validate
        run: |
          ruff check .
          python3 test_ff_orca.py
      - name: package + publish
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          zip -rq "flashforge-orca-presets-${GITHUB_REF_NAME}.zip" import-into-orca
          cat > NOTES.md <<'NOTE'
          FlashForge presets for OrcaSlicer, extracted from Flash Studio 1.7.8.

          Import one printer bundle below (the .orca_printer files) via
          OrcaSlicer -> File -> Import -> Import Configs..., or download the
          full zip for every loose preset plus the build-plate art. See the
          README for which files to pick.
          NOTE
          gh release create "${GITHUB_REF_NAME}" \
            import-into-orca/bundles/*.orca_printer \
            "flashforge-orca-presets-${GITHUB_REF_NAME}.zip" \
            --title "${GITHUB_REF_NAME}" --notes-file NOTES.md
